{% extends 'tickets/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h2 class="card-title mb-0">Criar Nova Conta</h2>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success">Cadastrar</button>
                    <a href="{% url 'login' %}" class="btn btn-secondary">Voltar para o Login</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
