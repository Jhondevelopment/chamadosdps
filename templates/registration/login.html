{% extends 'tickets/base.html' %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 75vh;">

    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white text-center">
                <h2 class="card-title mb-0">Login</h2>
            </div>
            <div class="card-body p-4">
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Seu nome de usuário e senha não correspondem. Por favor, tente novamente.
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Usuário</label>
                        <input type="text" name="username" class="form-control" required id="{{ form.username.id_for_label }}">
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control" required id="{{ form.password.id_for_label }}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>

                <div class="text-center mt-3">
                    <p>Não tem uma conta? <a href="{% url 'registrar' %}">Cadastre-se</a></p>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
