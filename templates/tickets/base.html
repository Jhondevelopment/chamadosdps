{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Central de Chamados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'tickets/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
                <img src="{% static 'tickets/img/logo.png' %}" alt="Logo D.P.S" height="30" class="me-2">
                <span>Central de Chamados</span>
            </a>
            
            {% if user.is_staff %}
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'dashboard' %}">Painel Principal</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'painel_resolvidos' %}">Concluídos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'painel_busca' %}">Arquivo/Busca Geral</a>
                </li>
            </ul>
            {% endif %}

            {% if user.is_authenticated %}
            <span class="navbar-text d-flex align-items-center">
                Olá, {{ user.username }}
                <form class="ms-2" method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link text-white-50 p-0" style="text-decoration: underline;">Sair</button>
                </form>
            </span>
            {% endif %}
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
</body>
</html>
